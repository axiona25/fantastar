services:
  db:
    image: postgres:16
    container_name: fantastar_db
    environment:
      POSTGRES_USER: fantastar
      POSTGRES_PASSWORD: fantastar
      POSTGRES_DB: fantastar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fantastar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fantastar_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: fantastar_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fantastar:fantastar@db:5432/fantastar
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./media:/app/media
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  redis_data:
